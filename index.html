<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Takip - GitHub Senkron</title>
    <!-- Mevcut stillerin aynen kalıyor, sadece GitHub paneli için ek stil ekledim -->
    <style>
        /* Mevcut CSS kodların burada olacak... */
        /* EK OLARAK GITHUB PANELI STİLİ: */
        .github-panel {
            background: #f0fff4;
            border: 1px solid #c6f6d5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .github-panel.acik { display: block; }
        .durum-noktasi {
            width: 12px; height: 12px;
            border-radius: 50%;
            display: inline-block;
            background: #f56565; /* Kırmızı */
            margin-right: 5px;
        }
        .durum-noktasi.aktif { background: #48bb78; } /* Yeşil */
        .sync-btnler { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Bütçe Takip</h1>
            <div>
                <button class="btn-kucuk" onclick="document.getElementById('ghPanel').classList.toggle('acik')">⚙️ GitHub</button>
                <button class="btn-icon" onclick="temaDegistir()" id="temaBtn">🌙</button>
            </div>
        </header>

        <!-- GitHub Ayar Paneli -->
        <div id="ghPanel" class="github-panel">
            <h3><span id="durumIsigi" class="durum-noktasi"></span> GitHub Senkronizasyon</h3>
            <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (ghp_...)" style="margin-top:10px;">
            <input type="text" id="ghGistId" placeholder="Gist ID (ee6d2...)" style="margin-top:10px;">
            <div class="sync-btnler">
                <button class="btn-kaydet" onclick="githubBagla()">Bağlan</button>
                <button class="btn-kucuk" onclick="veriyiGonder()">⬆️ GitHub'a Gönder</button>
                <button class="btn-kucuk" onclick="veriyiCek()">⬇️ GitHub'dan Yükle</button>
            </div>
        </div>

        <!-- Geri kalan HTML yapın aynen devam ediyor... -->
        <!-- (Özet kartları, Form, Liste vb.) -->

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // MEVCUT DEĞİŞKENLERİN
        let islemler = JSON.parse(localStorage.getItem('butce_islemler')) || [];
        // GITHUB DEĞİŞKENLERİ
        let GH_TOKEN = localStorage.getItem('gh_token') || "";
        let GH_GIST_ID = localStorage.getItem('gh_gist_id') || "";

        // GITHUB BAĞLANTI FONKSİYONU
        async function githubBagla() {
            GH_TOKEN = document.getElementById('ghToken').value.trim();
            GH_GIST_ID = document.getElementById('ghGistId').value.trim();
            
            if(!GH_TOKEN || !GH_GIST_ID) return alert("Lütfen bilgileri girin!");

            // Test için veriyi çekmeyi dene
            const basarili = await veriyiCek();
            if(basarili) {
                localStorage.setItem('gh_token', GH_TOKEN);
                localStorage.setItem('gh_gist_id', GH_GIST_ID);
                document.getElementById('durumIsigi').classList.add('aktif');
                alert("Bağlantı başarılı!");
            }
        }

        // VERİYİ GITHUB'A GÖNDER (PUSH)
        async function veriyiGonder() {
            if(!GH_TOKEN || !GH_GIST_ID) return alert("Önce GitHub'a bağlanmalısın!");
            
            const veri = {
                islemler: islemler,
                kategoriler: kategoriler
            };

            try {
                const response = await fetch(`https://api.github.com/gists/${GH_GIST_ID}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${GH_TOKEN}` },
                    body: JSON.stringify({
                        files: { "yemek_data.json": { content: JSON.stringify(veri) } }
                    })
                });
                if(response.ok) alert("Veriler GitHub'a yedeklendi!");
                else throw new Error();
            } catch (e) { alert("Gönderim hatası! Token veya ID hatalı olabilir."); }
        }

        // VERİYİ GITHUB'DAN ÇEK (PULL)
        async function veriyiCek() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GH_GIST_ID}`, {
                    headers: { 'Authorization': `token ${GH_TOKEN}` }
                });
                const data = await response.json();
                const icerik = JSON.parse(data.files["yemek_data.json"].content);
                
                if(icerik) {
                    islemler = icerik.islemler || [];
                    kategoriler = icerik.kategoriler || kategoriler;
                    kaydet();
                    guncelleHepsi();
                    return true;
                }
            } catch (e) { 
                console.error("Veri çekme hatası", e);
                return false; 
            }
        }

        // Sayfa yüklendiğinde bağlantıyı kontrol et
        window.onload = () => {
            if(GH_TOKEN && GH_GIST_ID) {
                document.getElementById('ghToken').value = GH_TOKEN;
                document.getElementById('ghGistId').value = GH_GIST_ID;
                document.getElementById('durumIsigi').classList.add('aktif');
                veriyiCek(); // Açılışta otomatik senkronize et
            }
        };

        // Geri kalan mevcut fonksiyonların (ozet, listele, grafikCiz vb.) aynen devam eder...
    </script>
</body>
</html>
