<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Takip & GitHub Sync</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
        }

        .sync-section {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        
        .btn-sync { background-color: #059669; }
        .btn-fetch { background-color: #7c3aed; }

        .status {
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card sync-section">
        <h3><i class="fas fa-cloud"></i> GitHub Bulut Yedekleme</h3>
        <input type="password" id="ghToken" placeholder="GitHub Token (ghp_...)" />
        <input type="text" id="gistId" placeholder="Gist ID" />
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="fetchFromGist()" class="btn-fetch"><i class="fas fa-download"></i> Buluttan Getir</button>
            <button onclick="saveToGist()" class="btn-sync"><i class="fas fa-upload"></i> Buluta Gönder</button>
        </div>
        <div id="syncStatus" class="status"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> Yeni İşlem Ekle</h3>
        <input type="text" id="desc" placeholder="Açıklama (Örn: Market)">
        <input type="number" id="amount" placeholder="Tutar (₺)">
        <select id="type">
            <option value="gider">Gider</option>
            <option value="gelir">Gelir</option>
        </select>
        <button onclick="addItem()">Ekle</button>
    </div>

    <div id="list" class="card">
        <h3><i class="fas fa-list"></i> İşlemler</h3>
        <div id="itemsContainer"></div>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('butce_verileri')) || [];
    const fileName = "butce_data.json";

    function updateUI() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = transactions.map((t, index) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1fr solid #eee;">
                <span>${t.desc}</span>
                <span style="color: ${t.type === 'gelir' ? 'green' : 'red'}">${t.amount} ₺</span>
            </div>
        `).join('');
        localStorage.setItem('butce_verileri', JSON.stringify(transactions));
    }

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if(!desc || !amount) return alert("Eksik alan bırakmayın!");

        transactions.unshift({ desc, amount, type, date: new Date().toISOString() });
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    async function saveToGist() {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        const status = document.getElementById('syncStatus');

        if(!token || !id) return alert("Token ve Gist ID gerekli!");

        status.style.display = "block";
        status.innerText = "Yükleniyor...";
        status.style.backgroundColor = "#fef3c7";

        try {
            const response = await fetch(`https://api.github.com/gists/${id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    files: { [fileName]: { content: JSON.stringify(transactions, null, 2) } }
                })
            });

            if(response.ok) {
                status.innerText = "Buluta başarıyla kaydedildi!";
                status.style.backgroundColor = "#dcfce7";
                localStorage.setItem('gh_token', token);
                localStorage.setItem('gh_gist_id', id);
            } else {
                throw new Error("Hata oluştu.");
            }
        } catch (e) {
            status.innerText = "Bağlantı hatası!";
            status.style.backgroundColor = "#fee2e2";
        }
    }

    async function fetchFromGist() {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        
        if(!token || !id) return alert("Token ve Gist ID gerekli!");

        try {
            const response = await fetch(`https://api.github.com/gists/${id}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await response.json();
            if(data.files[fileName]) {
                transactions = JSON.parse(data.files[fileName].content);
                updateUI();
                alert("Veriler buluttan başarıyla çekildi!");
            }
        } catch (e) {
            alert("Veri çekme hatası!");
        }
    }

    // Sayfa açıldığında bilgileri getir
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gistId').value = localStorage.getItem('gh_gist_id') || '';
        updateUI();
    }
</script>

</body>
</html>
