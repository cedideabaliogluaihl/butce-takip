<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçem v3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #4f46e5; --s: #10b981; --d: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 360px; background: #fff; border-radius: 24px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h3 { margin: 0; font-size: 1.1rem; color: #1e293b; letter-spacing: -0.5px; }
        
        .settings { display: none; background: #f1f5f9; padding: 12px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .settings.active { display: block; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 13px; transition: 0.2s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .summary { background: #1e293b; color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .summary-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .summary-val { font-size: 26px; font-weight: 700; margin: 4px 0; }
        
        .stats { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .stat { flex: 1; font-size: 12px; }
        .stat span { display: block; font-weight: bold; font-size: 14px; }

        .item { display: flex; align-items: center; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: #fff; border: 1px solid #f1f5f9; transition: 0.2s; }
        .item:active { transform: scale(0.98); }
        .icon-box { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .inc-bg { background: #dcfce7; color: var(--s); }
        .exp-bg { background: #fee2e2; color: var(--d); }

        .btn-add { background: var(--p); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; font-size: 14px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .btn-del { color: #94a3b8; cursor: pointer; margin-left: 10px; font-size: 14px; }
        
        #status { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 10px; color: #94a3b8; pointer-events: none; }
        .cloud-badge { font-size: 10px; background: #e2e8f0; padding: 2px 8px; border-radius: 10px; color: #64748b; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h3>Bütçe Akışım <span id="syncBadge" class="cloud-badge">Güncel</span></h3>
        <button onclick="toggleSettings()" style="border:none; background:none; color:#64748b; cursor:pointer"><i class="fas fa-cog"></i></button>
    </div>

    <div id="settings" class="settings">
        <input type="password" id="ghToken" placeholder="GitHub Token">
        <input type="text" id="gistId" placeholder="Gist ID">
        <button onclick="fetchFromGist()" style="width:100%; padding:8px; border-radius:8px; border:none; background:#cbd5e1; font-size:11px; cursor:pointer">Zorla Buluttan Getir</button>
    </div>

    <div class="summary">
        <div class="summary-label">Kullanılabilir Bakiye</div>
        <div id="netBalance" class="summary-val">0.00 ₺</div>
        <div class="stats">
            <div class="stat">Gelir <span id="totalIn" style="color:#4ade80">+0</span></div>
            <div class="stat">Gider <span id="totalOut" style="color:#f87171">-0</span></div>
        </div>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="desc" placeholder="İşlem adı...">
        <div style="display: flex; gap: 8px;">
            <input type="number" id="amount" placeholder="0.00" style="flex: 2;">
            <select id="type" style="flex: 1;">
                <option value="gider">Gider</option>
                <option value="gelir">Gelir</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItem()">İşlemi Kaydet</button>
    </div>

    <div id="list" style="max-height: 300px; overflow-y: auto; padding-bottom: 20px;"></div>
    
    <div id="status">Hazır</div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('butce_v3_data')) || [];
    const fileName = "butce_data.json";

    function toggleSettings() { document.getElementById('settings').classList.toggle('active'); }

    function updateUI() {
        const list = document.getElementById('list');
        let inc = 0, exp = 0;
        list.innerHTML = '';

        transactions.forEach((t, i) => {
            const val = parseFloat(t.amount);
            const isInc = t.type === 'gelir';
            if(isInc) inc += val; else exp += val;
            
            list.innerHTML += `
                <div class="item">
                    <div class="icon-box ${isInc ? 'inc-bg' : 'exp-bg'}">
                        <i class="fas ${isInc ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                    </div>
                    <div style="flex:1; margin-left:12px">
                        <div style="font-weight:600; font-size:14px; color:#334155">${t.desc}</div>
                        <div style="font-size:11px; color:#94a3b8">${new Date(t.date).toLocaleDateString('tr-TR')}</div>
                    </div>
                    <div style="font-weight:700; font-size:14px; color:${isInc ? 'var(--s)' : 'var(--d)'}">
                        ${isInc ? '+' : '-'}${val.toFixed(2)}
                    </div>
                    <div onclick="deleteItem(${i})" class="btn-del"><i class="fas fa-times"></i></div>
                </div>`;
        });

        document.getElementById('totalIn').innerText = '+' + inc.toFixed(2);
        document.getElementById('totalOut').innerText = '-' + exp.toFixed(2);
        document.getElementById('netBalance').innerText = (inc - exp).toFixed(2) + " ₺";
        localStorage.setItem('butce_v3_data', JSON.stringify(transactions));
    }

    async function sync(action = 'save') {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        const status = document.getElementById('status');
        const badge = document.getElementById('syncBadge');
        if(!token || !id) return;

        badge.innerText = "Bağlanıyor...";
        status.innerText = "Bulut senkronize ediliyor...";

        try {
            if(action === 'save') {
                await fetch(`https://api.github.com/gists/${id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(transactions, null, 2) } } })
                });
            } else {
                const res = await fetch(`https://api.github.com/gists/${id}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                if(data.files[fileName]) transactions = JSON.parse(data.files[fileName].content);
            }
            updateUI();
            badge.innerText = "Güncel";
            status.innerText = "Bulut ile eşitlendi ✅";
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_gist_id', id);
        } catch (e) { 
            badge.innerText = "Hata";
            status.innerText = "Bağlantı kurulamadı!"; 
        }
    }

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        if(!desc || !amount) return;

        transactions.unshift({ desc, amount, type, date: new Date().toISOString() });
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        updateUI();
        sync('save');
    }

    function deleteItem(index) {
        if(confirm("Silinsin mi?")) {
            transactions.splice(index, 1);
            updateUI();
            sync('save');
        }
    }

    // AÇILIŞTA OTOMATİK ÇALIŞAN KISIM
    window.onload = async () => {
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gistId').value = localStorage.getItem('gh_gist_id') || '';
        updateUI();
        // Sayfa açılır açılmaz buluttan en güncel halini çek
        if(localStorage.getItem('gh_token')) {
            await sync('fetch');
        }
    };
</script>
</body>
</html>
