<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçem v4 - Aylık Takip</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #4f46e5; --s: #10b981; --d: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 360px; background: #fff; border-radius: 24px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; min-height: 90vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tabs { display: flex; gap: 5px; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; background: transparent; color: #64748b; }
        .tab-btn.active { background: #fff; color: var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .summary-card { background: #1e293b; color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .month-label { font-size: 14px; opacity: 0.8; margin-bottom: 5px; text-align: center; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        .summary-val { font-size: 28px; font-weight: 700; text-align: center; margin: 10px 0; color: #fff; }
        
        .mini-stats { display: flex; justify-content: space-between; font-size: 12px; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .stat-item { text-align: center; flex: 1; }
        .stat-item span { display: block; font-weight: bold; font-size: 14px; margin-top: 3px; }

        .item { display: flex; align-items: center; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: #fff; border: 1px solid #f1f5f9; }
        .icon-box { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .form-group { background: #f8fafc; padding: 12px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 13px; }
        .btn-add { background: var(--p); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 5px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }

        .settings { display: none; position: absolute; top: 50px; right: 16px; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 12px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .settings.active { display: block; }
        #status { font-size: 10px; color: #94a3b8; text-align: center; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h3 style="margin:0; font-size: 1.1rem;">Bütçe Takibim</h3>
        <button onclick="document.getElementById('settings').classList.toggle('active')" style="border:none; background:none; color:#64748b; cursor:pointer"><i class="fas fa-cog"></i></button>
    </div>

    <div id="settings" class="settings">
        <input type="password" id="ghToken" placeholder="GitHub Token" style="font-size: 10px;">
        <input type="text" id="gistId" placeholder="Gist ID" style="font-size: 10px;">
        <button onclick="sync('fetch')" style="width:100%; font-size:10px; margin-top:5px; cursor:pointer">Zorla Yenile</button>
    </div>

    <div class="summary-card">
        <div id="currentMonth" class="month-label">Mayıs 2026</div>
        <div class="month-label" style="font-size: 10px; border:none; opacity: 0.6;">Aylık Net Bakiye</div>
        <div id="netBalance" class="summary-val">0.00 ₺</div>
        <div class="mini-stats">
            <div class="stat-item">Aylık Gelir <span id="totalIn" style="color:#4ade80">+0</span></div>
            <div class="stat-item">Aylık Gider <span id="totalOut" style="color:#f87171">-0</span></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gider')">Giderler</button>
        <button class="tab-btn" onclick="switchTab('gelir')">Gelirler</button>
        <button class="tab-btn" onclick="switchTab('ekle')">Yeni Ekle</button>
    </div>

    <!-- LİSTE SAYFALARI -->
    <div id="listContainer">
        <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
    </div>

    <!-- EKLEME FORMU (Varsayılan olarak gizli) -->
    <div id="addForm" class="form-group hidden">
        <input type="text" id="desc" placeholder="İşlem adı (Örn: Kira, Maaş)">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="amount" placeholder="Tutar" style="flex: 2;">
            <select id="type" style="flex: 1;">
                <option value="gider">Gider</option>
                <option value="gelir">Gelir</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItem()">Kaydet ve Yedekle</button>
    </div>
    
    <div id="status">Bağlantı Hazır</div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('butce_v4_data')) || [];
    let currentTab = 'gider';
    const fileName = "butce_data.json";

    const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        if(tab === 'ekle') {
            document.getElementById('addForm').classList.remove('hidden');
            document.getElementById('listContainer').classList.add('hidden');
        } else {
            document.getElementById('addForm').classList.add('hidden');
            document.getElementById('listContainer').classList.remove('hidden');
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('list');
        const now = new Date();
        const currentMonthIdx = now.getMonth();
        const currentYear = now.getFullYear();

        document.getElementById('currentMonth').innerText = `${months[currentMonthIdx]} ${currentYear}`;
        
        let mInc = 0, mExp = 0;
        list.innerHTML = '';

        // Sadece seçili aya ait olanları hesapla
        transactions.forEach((t, i) => {
            const tDate = new Date(t.date);
            const val = parseFloat(t.amount);
            
            // Aylık hesaplama (Sadece bu ay)
            if(tDate.getMonth() === currentMonthIdx && tDate.getFullYear() === currentYear) {
                if(t.type === 'gelir') mInc += val; else mExp += val;
            }

            // Sayfa filtresi (Gelir tabındaysan gelirleri, giderdeysen giderleri göster)
            if(t.type === currentTab) {
                const isInc = t.type === 'gelir';
                list.innerHTML += `
                    <div class="item">
                        <div class="icon-box" style="background:${isInc ? '#dcfce7' : '#fee2e2'}; color:${isInc ? var(--s) : var(--d)}">
                            <i class="fas ${isInc ? 'fa-plus' : 'fa-minus'}"></i>
                        </div>
                        <div style="flex:1; margin-left:12px">
                            <div style="font-weight:600; font-size:14px; color:#334155">${t.desc}</div>
                            <div style="font-size:10px; color:#94a3b8">${tDate.toLocaleDateString('tr-TR')}</div>
                        </div>
                        <div style="font-weight:700; font-size:14px; color:${isInc ? 'var(--s)' : 'var(--d)'}">
                            ${val.toFixed(2)} ₺
                        </div>
                        <div onclick="deleteItem(${i})" style="color:#cbd5e1; margin-left:10px; cursor:pointer"><i class="fas fa-trash"></i></div>
                    </div>`;
            }
        });

        document.getElementById('totalIn').innerText = '+' + mInc.toFixed(2);
        document.getElementById('totalOut').innerText = '-' + mExp.toFixed(2);
        document.getElementById('netBalance').innerText = (mInc - mExp).toFixed(2) + " ₺";
        localStorage.setItem('butce_v4_data', JSON.stringify(transactions));
    }

    async function sync(action = 'save') {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        if(!token || !id) return;
        document.getElementById('status').innerText = "Bulutla senkronize ediliyor...";

        try {
            if(action === 'save') {
                await fetch(`https://api.github.com/gists/${id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ files: { [fileName]: { content: JSON.stringify(transactions, null, 2) } } })
                });
            } else {
                const res = await fetch(`https://api.github.com/gists/${id}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                if(data.files[fileName]) transactions = JSON.parse(data.files[fileName].content);
            }
            updateUI();
            document.getElementById('status').innerText = "Güncellendi ✅";
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_gist_id', id);
        } catch (e) { document.getElementById('status').innerText = "Bağlantı Hatası!"; }
    }

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        if(!desc || !amount) return;

        transactions.unshift({ desc, amount, type, date: new Date().toISOString() });
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        // Ekleme sonrası o listeye git
        switchTab(type);
        sync('save');
    }

    function deleteItem(index) {
        if(confirm("Silinsin mi?")) {
            transactions.splice(index, 1);
            updateUI();
            sync('save');
        }
    }

    window.onload = async () => {
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gistId').value = localStorage.getItem('gh_gist_id') || '';
        updateUI();
        if(localStorage.getItem('gh_token')) await sync('fetch');
    };
</script>
</body>
</html>
