<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bütçe Yönetimi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--surface);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        /* Bulut Ayarları Paneli - Gizlenebilir */
        .settings-panel {
            background: #f9fafb;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none; /* Varsayılan gizli */
            border: 1px solid #e5e7eb;
        }

        .settings-panel.active { display: block; animation: slideDown 0.3s ease; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #6b7280; width: auto; padding: 8px 12px; }
        .btn-sync { background: var(--success); color: white; flex: 1; }
        .btn-fetch { background: #8b5cf6; color: white; flex: 1; }

        .balance-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #fff;
            border-bottom: 1px solid #f3f4f6;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
            display: inline-block;
            margin-right: 5px;
        }

        .status-online { background: var(--success); box-shadow: 0 0 5px var(--success); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h2>Bütçem</h2>
        <button class="btn btn-outline" onclick="toggleSettings()">
            <i class="fas fa-cog"></i> Bulut Ayarları
        </button>
    </header>

    <div id="settings" class="settings-panel">
        <label style="font-size: 12px; font-weight: bold; color: #6b7280;">GITHUB YAPILANDIRMASI</label>
        <input type="password" id="ghToken" placeholder="GitHub Token">
        <input type="text" id="gistId" placeholder="Gist ID">
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button onclick="fetchFromGist()" class="btn btn-fetch"><i class="fas fa-cloud-download-alt"></i> Veri Çek</button>
            <button onclick="saveToGist()" class="btn btn-sync"><i class="fas fa-cloud-upload-alt"></i> Buluta Yedekle</button>
        </div>
        <div id="statusLabel" style="font-size: 11px; margin-top: 10px; text-align: center; color: #9ca3af;">Bulut bağlantısı bekleniyor...</div>
    </div>

    <div class="balance-card">
        <div style="opacity: 0.8; font-size: 0.9rem;">Toplam Bakiye</div>
        <div id="totalBalance" style="font-size: 2rem; font-weight: 700; margin-top: 5px;">0.00 ₺</div>
    </div>

    <div style="margin-bottom: 30px;">
        <h4 style="margin-bottom: 10px;">Yeni İşlem</h4>
        <input type="text" id="desc" placeholder="Açıklama (örn. Kira, Market)">
        <input type="number" id="amount" placeholder="Tutar">
        <select id="type">
            <option value="gider">Gider (-)</option>
            <option value="gelir">Gelir (+)</option>
        </select>
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="addItem()">
            <i class="fas fa-plus"></i> Listeye Ekle
        </button>
    </div>

    <div>
        <h4 style="margin-bottom: 10px;">Son İşlemler</h4>
        <div id="itemsContainer" style="border-radius: 15px; overflow: hidden; border: 1px solid #f3f4f6;">
            <!-- İşlemler buraya gelecek -->
        </div>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('butce_verileri')) || [];
    const fileName = "butce_data.json";

    function toggleSettings() {
        const panel = document.getElementById('settings');
        panel.classList.toggle('active');
    }

    function updateUI() {
        const container = document.getElementById('itemsContainer');
        const balanceDisplay = document.getElementById('totalBalance');
        let total = 0;

        container.innerHTML = transactions.length ? '' : '<div style="padding: 20px; text-align: center; color: #9ca3af;">Henüz işlem yok</div>';

        transactions.forEach((t, index) => {
            const val = parseFloat(t.amount);
            total += (t.type === 'gelir' ? val : -val);
            
            container.innerHTML += `
                <div class="list-item">
                    <div>
                        <div style="font-weight: 600;">${t.desc}</div>
                        <div style="font-size: 11px; color: #9ca3af;">${new Date(t.date).toLocaleDateString()}</div>
                    </div>
                    <div style="font-weight: 700; color: ${t.type === 'gelir' ? 'var(--success)' : 'var(--danger)'}">
                        ${t.type === 'gelir' ? '+' : '-'}${val.toFixed(2)} ₺
                    </div>
                </div>
            `;
        });

        balanceDisplay.innerText = total.toFixed(2) + " ₺";
        localStorage.setItem('butce_verileri', JSON.stringify(transactions));
    }

    async function saveToGist() {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        const status = document.getElementById('statusLabel');

        if(!token || !id) return alert("Önce ayarları doldurun!");

        status.innerText = "Bulut güncelleniyor...";

        try {
            const response = await fetch(`https://api.github.com/gists/${id}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    files: { [fileName]: { content: JSON.stringify(transactions, null, 2) } }
                })
            });

            if(response.ok) {
                status.innerText = "Bulut ile senkronize edildi ✅";
                status.style.color = "var(--success)";
                localStorage.setItem('gh_token', token);
                localStorage.setItem('gh_gist_id', id);
            } else { alert("Hata: Gist ID veya Token yanlış olabilir."); }
        } catch (e) { status.innerText = "Bağlantı hatası!"; }
    }

    async function fetchFromGist() {
        const token = document.getElementById('ghToken').value;
        const id = document.getElementById('gistId').value;
        
        if(!token || !id) return alert("Ayarlar eksik!");

        try {
            const response = await fetch(`https://api.github.com/gists/${id}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await response.json();
            if(data.files && data.files[fileName]) {
                transactions = JSON.parse(data.files[fileName].content);
                updateUI();
                alert("Veriler buluttan başarıyla çekildi!");
            } else {
                alert("Bulutta henüz dosya yok. Önce 'Yedekle' diyerek dosya oluşturun.");
            }
        } catch (e) { alert("Bağlantı hatası!"); }
    }

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if(!desc || !amount) return;

        transactions.unshift({ desc, amount, type, date: new Date().toISOString() });
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        document.getElementById('gistId').value = localStorage.getItem('gh_gist_id') || '';
        updateUI();
    }
</script>

</body>
</html>
